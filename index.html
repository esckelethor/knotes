<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K-NOTES ~ K-주석</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/icon/favicon.ico">
    <link rel="stylesheet" href="./css/style.css"></link>
    <link rel="stylesheet" href="./css/anexos.css"></link>
    <link rel="stylesheet" href="./css/notes.css"></link>
    <!-- web-app -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./manifest.json">
</head>
<body>
    <div class="header">
        <img src="./assets/img/basic/logo.png" alt="logo" class="logo"/>
        <img src="./assets/img/basic/sam_taeguk.png" alt="sam_taeguk" class="sam_taeguk_dj"/>
        <ul id="menu"></ul>
    </div>
    <div class="main">
        <div class="aside"></div>
        <div id="note" class="content"></div>
    </div>
    <div id="spotify">
        <div class="container">
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
        <div id="playlist"></div>
    </div>
    <div id="lang-selector">
        <div id="lang-kr" class="lang-item">
            <img src="./assets/img/flags/kr.png" alt="lang-kr">
            <div>Coreano</div>
        </div>
        <div id="lang-en" class="lang-item">
            <img src="./assets/img/flags/en.png" alt="lang-en">
            <div>Inglés</div>
        </div>
        <div id="lang-fr" class="lang-item lang-disabled">
            <img src="./assets/img/flags/fr.png" alt="lang-fr">
            <div>Francés</div>
        </div>
    </div>
    <div class="footer">
        <div id="lang">
            <img src="./assets/img/flags/kr.png" alt="lang-sel" id="lang-sel"/>
            <div>Coreano</div>
        </div>
        <div id="copyrigth">
            &copy;&nbsp;
            <a href="https://github.com/esckelethor" target="_blank" rel="noopener noreferrer">
                esckelethor <img src="https://avatars.githubusercontent.com/u/26528445?v=4"/></img>
            </a>
            &amp;&nbsp;
            <a href="https://github.com/yaiangel13" target="_blank" rel="noopener noreferrer">
                yaiangel13 <img src="https://avatars.githubusercontent.com/u/12645830?v=4"/>
            </a>
        </div>
        <div id="version"></div>
    </div>
    <script src="https://open.spotify.com/embed/iframe-api/v1"></script>
    <script type="application/javascript" src="./js/vQuery.js"></script>
    <script type="application/javascript" src="./js/menu.js"></script>
    <script type="application/javascript" src="./assets/navbar/kr.js"></script>
    <script type="application/javascript" src="./assets/navbar/en.js"></script>
    <script type="application/javascript" src="./js/main.js"></script>
</body>
</html>
