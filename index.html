<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K-NOTES ~ K-주석</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/icon/favicon.ico">
    <link rel="stylesheet" href="./css/style.css"></link>
    <link rel="stylesheet" href="./css/anexos.css"></link>
    <link rel="stylesheet" href="./css/changelog.css"></link>
    <link rel="stylesheet" href="./css/notes.css"></link>
    <!-- web-app -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./manifest.json">
</head>
<body>
    <div class="header">
        <img src="./assets/img/basic/logo.png" alt="logo" class="logo"/>
        <img src="./assets/img/basic/sam_taeguk.png" alt="sam_taeguk" class="logo2"/>
        <ul id="menu"></ul>
    </div>
    <div class="main">
        <div class="aside"></div>
        <div id="note" class="content"></div>
    </div>
    <div id="spotify">
        <div class="container">
            <div id="spotify_playlist_nolja" class="item selected" data-spotify-id="spotify:playlist:37i9dQZF1DXdR77H5Z8MIM">놀자!</div>
            <div id="spotify_playlist_summer-hits" class="item" data-spotify-id="spotify:playlist:37i9dQZF1DX1lU51fgoMhF">썸머 히트</div>
            <div id="spotify_playlist_kpop-on" class="item" data-spotify-id="spotify:playlist:37i9dQZF1DX9tPFwDMOaN1">K-POP 온</div>
            <div id="spotify_playlist_hallyu-mix" class="item" data-spotify-id="spotify:playlist:37i9dQZF1EIhnRNqAzxrQB">한류 믹스</div>
        </div>
        <div id="playlist"></div>
    </div>
    <div id="changelog">
        <div id="changelogContents">
            <div id="changelog-currentVersion"></div>
            <div id="changelog-knowIssues">
                <h4 class="knownIssues-title">
                    Errores conocidos
                    <code class="knownIssues">known issues</code>
                </h4>
                <div id="knownIssuesContent"></div>
            </div>
            <div id="changelog-oldVersions"></div>
        </div>
        <div id="full-changelog">VER HISTORIAL</div>
    </div>
    <div id="lang-selector">
        <div id="lang-kr" class="lang-item">
            <img src="./assets/img/flags/kr.png" alt="lang-kr">
            <div>Coreano</div>
        </div>
        <div id="lang-en" class="lang-item">
            <img src="./assets/img/flags/en.png" alt="lang-en">
            <div>Inglés</div>
        </div>
        <div id="lang-fr" class="lang-item lang-disabled">
            <img src="./assets/img/flags/fr.png" alt="lang-fr">
            <div>Francés</div>
        </div>
        <div id="lang-jp" class="lang-item lang-disabled">
            <img src="./assets/img/flags/jp.png" alt="lang-jp">
            <div>Japonés</div>
        </div>
    </div>
    <div class="footer">
        <div id="lang">
            <img src="./assets/img/flags/kr.png" alt="lang-sel" id="lang-sel"/>
            <div>Coreano</div>
        </div>
        <div id="copyrigth">
            &copy;&nbsp;
            <a href="https://github.com/esckelethor">esckelethor</a>
            <a href="https://github.com/esckelethor"><img src="https://avatars.githubusercontent.com/u/26528445?v=4"/></img></a>
            &amp;&nbsp;
            <a href="https://github.com/yaiangel13">yaiangel13</a>
            <a href="https://github.com/yaiangel13"><img src="https://avatars.githubusercontent.com/u/12645830?v=4"/></a>
        </div>
        <div id="version"></div>
    </div>
    <script src="https://open.spotify.com/embed/iframe-api/v1"></script>
    <script type="application/javascript" src="./js/vQuery.js"></script>
    <script type="application/javascript" src="./assets/modules/changelog.js"></script>
    <script type="application/javascript" src="./js/menu.js"></script>
    <script type="application/javascript" src="./assets/navbar/kr.js"></script>
    <script type="application/javascript" src="./assets/navbar/en.js"></script>
    <script type="application/javascript" src="./js/main.js"></script>
</body>
</html>
